<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stonehenge Phase 3 - Interactive 3D</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #loading-screen {
            position: absolute; width: 100%; height: 100%; background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p id="status">Downloading Stonehenge Phase 3...</p>
        <p id="progress">0%</p>
    </div>

    <div id="ui">
        <h1>STONEHENGE: PHASE 3</h1>
        <p>Use 1 finger to rotate • 2 fingers to zoom/pan</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CONFIGURATION ---
        // REPLACE 'YOUR_USERNAME' and 'YOUR_REPO' with your actual GitHub details!
        const USERNAME = 'YOUR_USERNAME'; 
        const REPO = 'YOUR_REPO';
        const FILE_NAME = 'Phase3.glb';
        const MODEL_URL = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/${FILE_NAME}`;

        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // High res but saves battery
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // 2. Lighting (Natural Sun Look)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1); 
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // 3. Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 4. Loading the Model
        const loader = new GLTFLoader();
        loader.load(MODEL_URL, (gltf) => {
            const model = gltf.scene;
            
            // Center the model perfectly
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 
            
            scene.add(model);
            document.getElementById('loading-screen').style.display = 'none';
            console.log("King, Phase 3 is loaded!");
        }, 
        (xhr) => {
            if (xhr.lengthComputable) {
                const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('progress').innerText = percentComplete + '%';
            }
        },
        (error) => {
            document.getElementById('status').innerText = "Error! Check your GitHub link.";
            console.error("Model load failed:", error);
        });

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 6. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
