<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stonehenge 3D</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; }
        #msg { position: absolute; width: 100%; text-align: center; top: 40%; }
    </style>
</head>
<body>
    <div id="msg">Initializing...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. THE ONLY LINE TO CHANGE:
        // Make sure this link works in your browser tab first!
        const MODEL_URL = 'https://raw.githubusercontent.com/karkirijan38/stonehenge-models/main/Phase3.glb';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2));
        camera.position.z = 15;

        const controls = new OrbitControls(camera, renderer.domElement);

        const loader = new GLTFLoader();
        loader.load(MODEL_URL, (gltf) => {
            scene.add(gltf.scene);
            document.getElementById('msg').style.display = 'none';
        }, 
        (xhr) => {
            document.getElementById('msg').innerHTML = "Loading: " + Math.round(xhr.loaded/xhr.total*100) + "%";
        },
        (err) => {
            document.getElementById('msg').innerHTML = "FAILED TO LOAD.<br>Check if Phase3.glb is in your repo.";
            console.error(err);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
