<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stonehenge Phase 3 - King's Preview</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; overflow: hidden; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Phase 3... <br> <span id="percent">0%</span></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. YOUR RAW LINK HERE (Replace this with your link)
        const MODEL_URL = 'https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/Phase+3v1.glb';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // Controls (Touch-friendly for phone)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Loader
        const loader = new GLTFLoader();
        loader.load(MODEL_URL, (gltf) => {
            document.getElementById('loading').style.display = 'none';
            const model = gltf.scene;
            
            // Center the model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 
            
            scene.add(model);
        }, 
        (xhr) => {
            const p = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById('percent').innerText = p + '%';
        },
        (err) => {
            document.getElementById('loading').innerText = "Link Error! Check Raw URL.";
            console.error(err);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
